<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entrar • Painel DO-AGA</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="shell">
  <main class="card">
    <header class="card-head">
      <h1 class="title">Entrar</h1>
      <p class="status">Acesse com seu e-mail e senha.</p>
    </header>

    <form id="login-form" class="vstack gap" autocomplete="on">
      <label class="field">
        <span>E-mail</span>
        <input type="email" id="email" autocomplete="username" required />
      </label>
      <label class="field">
        <span>Senha</span>
        <input type="password" id="password" autocomplete="current-password" required />
      </label>
      <div class="row-between">
        <label class="row gap">
          <input type="checkbox" id="remember" />
          <span class="status">Manter conectado</span>
        </label>
        <button class="btn primary" type="submit">Entrar</button>
      </div>
      <p id="login-msg" class="status"></p>
    </form>

    <hr class="sep"/>

    <section class="vstack gap">
      <h2 class="subtitle">Primeiro acesso</h2>
      <form id="register-form" class="vstack gap" autocomplete="on">
        <label class="field">
          <span>Nome</span>
          <input type="text" id="name" autocomplete="name" />
        </label>
        <label class="field">
          <span>E-mail institucional</span>
          <input type="email" id="reg-email" autocomplete="username" />
        </label>
        <div class="row-end">
          <button class="btn" type="submit">Registrar</button>
        </div>
        <p id="register-msg" class="status"></p>
      </form>
    </section>

    <dialog id="set-password" class="dialog">
      <form method="dialog" class="vstack gap" id="newpass-form">
        <h3 class="subtitle">Definir senha</h3>
        <p class="status">Crie sua senha para continuar.</p>
        <label class="field">
          <span>Senha</span>
          <input type="password" id="new-password" autocomplete="new-password" minlength="8" required />
        </label>
        <label class="field">
          <span>Confirmar senha</span>
          <input type="password" id="new-password2" autocomplete="new-password" minlength="8" required />
        </label>
        <div class="row-end gap">
          <button type="button" class="btn" id="cancel-newpass">Cancelar</button>
          <button type="submit" class="btn primary">Salvar e continuar</button>
        </div>
        <p id="password-msg" class="status"></p>
      </form>
    </dialog>
  </main>
