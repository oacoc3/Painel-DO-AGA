<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal DO-AGA</title>
  <link rel="stylesheet" href="style.css"/>
  <script defer src="app.js"></script>
</head>
<body class="login-page">
  <main class="card">
    <h1>Entrar</h1>
    <p class="subtitle">Acesse com seu e-mail e senha.</p>

    <form id="login-form" class="vstack gap" autocomplete="on">
      <label class="field">
        <span>E-mail</span>
        <input type="email" id="email" autocomplete="username" required />
      </label>
      <label class="field">
        <span>Senha</span>
        <input type="password" id="password" autocomplete="current-password" required />
      </label>
      <div class="row-between">
        <label class="row gap">
          <input type="checkbox" id="remember" />
          <span class="status">Manter conectado</span>
        </label>
        <button class="btn primary" type="submit">Entrar</button>
      </div>
      <p id="login-msg" class="status"></p>
    </form>

    <!-- 🚫 Bloco de auto-registro removido -->
