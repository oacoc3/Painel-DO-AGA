<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel DO-AGA</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="shell">
  <main class="card">
    <header class="card-head row-between">
      <div class="vstack">
        <h1 class="title">Painel DO-AGA</h1>
        <p class="status" id="hello"></p>
      </div>
      <div class="row-end">
        <button class="btn" id="logout">Sair</button>
      </div>
    </header>

    <!-- Busca por NUP -->
    <section class="vstack gap" id="search-nup-box">
      <form id="search-nup-form" class="vstack gap" autocomplete="off">
        <label class="field">
          <span>NUP</span>
          <input type="text" id="search-nup" placeholder="Digite o NUP completo ou parcial" />
        </label>
        <div class="row-end">
          <button class="btn primary" type="submit">Buscar</button>
        </div>
        <p id="search-nup-msg" class="status"></p>
        <div id="search-nup-result" class="vstack gap"></div>
      </form>
    </section>
  </main>

  <!-- Rodapé com versão/build, alinhado à esquerda -->
  <footer class="status"><span id="build-info" class="muted"></span></footer>

</body>
